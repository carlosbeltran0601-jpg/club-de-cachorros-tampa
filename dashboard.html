<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard | clubofpuppy.com</title>
    <style>
        :root { --gold: #c5a059; --black: #1a1a1a; --cream: #fdfaf5; --white: #ffffff; }
        body { font-family: 'Times New Roman', Times, serif; background-color: var(--cream); margin: 0; }
        
        .nav { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .nav a { text-decoration: none; color: var(--black); font-weight: bold; }

        .container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        
        .back-link { display: inline-block; margin-bottom: 20px; color: var(--gold); text-decoration: none; font-weight: bold; }

        .welcome-card { background: white; padding: 30px; border-radius: 12px; border-left: 5px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; position: relative; }
        
        /* Logout Button Style */
        .logout-btn {
            background: #f44336;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            transition: 0.3s;
        }
        .logout-btn:hover { background: #d32f2f; }

        .dashboard-tabs { display: flex; gap: 20px; margin: 20px 0; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; font-family: inherit; font-size: 1rem; font-weight: bold; cursor: pointer; color: #666; }
        .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .stat-box { background: white; padding: 20px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .stat-box h3 { margin: 0; color: var(--gold); font-size: 2rem; }
        
        .action-btn { background: var(--black); color: white; padding: 15px 30px; border-radius: 30px; text-decoration: none; display: inline-block; font-weight: bold; margin-top: 20px; }
        
        .hidden { display: none; }
        .listing-card { background: white; padding: 20px; border-radius: 8px; border: 1px dashed #ccc; text-align: center; color: #888; }
    </style>
</head>
<body>

<nav class="nav">
    <a href="index.html">🐾 clubofpuppy.com</a>
    <a href="#" onclick="logoutUser()" class="logout-btn">Logout</a>
</nav>

<div class="container">
    <a href="index.html" class="back-link">← Back to Homepage</a>

    <div class="welcome-card">
        <div style="display: flex; justify-content: space-between; align-items: start;">
            <div>
                <h2>Welcome Back, <span id="userEmailDisplay">Member</span>!</h2>
                <p>Status: <span style="color: var(--gold); font-weight: bold;">✔ Identity Verified</span></p>
            </div>
        </div>
        
        <div class="dashboard-tabs">
            <button class="tab-btn active" onclick="switchTab('overview')">Overview</button>
            <button class="tab-btn" onclick="switchTab('puppies')">My Puppies for Sale</button>
        </div>

        <div id="overview-section">
            <div class="stats-grid">
                <div class="stat-box"><h3>0</h3><p>Active Listings</p></div>
                <div class="stat-box"><h3>0</h3><p>Inquiries</p></div>
                <div class="stat-box"><h3>$20</h3><p>Monthly Plan</p></div>
            </div>
            <a href="post-puppy.html" class="action-btn">+ Post New Puppy</a>
        </div>

        <div id="puppies-section" class="hidden">
            <h3>Your Live Listings</h3>
            <div class="listing-card">
                <p>You haven't listed any puppies yet.</p>
                <a href="post-puppy.html" style="color: var(--gold); font-weight: bold; text-decoration: none;">Create your first listing now</a>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. SECURITY CHECK: If not logged in, send to sign-in page
    if (localStorage.getItem('isLoggedIn') !== 'true') {
        window.location.href = "signin.html";
    }

    // 2. Display Email
    const email = localStorage.getItem('clubUserEmail') || "Member";
    document.getElementById('userEmailDisplay').innerText = email;

    // 3. LOGOUT FUNCTION
    function logoutUser() {
        localStorage.removeItem('isLoggedIn'); // Clears only the login status
        alert("You have been logged out.");
        window.location.href = "index.html";
    }

    // 4. Tab Switching
    function switchTab(tabName) {
        const overview = document.getElementById('overview-section');
        const puppies = document.getElementById('puppies-section');
        const buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        if (tabName === 'overview') {
            overview.classList.remove('hidden');
            puppies.classList.add('hidden');
            buttons[0].classList.add('active');
        } else {
            overview.classList.add('hidden');
            puppies.classList.remove('hidden');
            buttons[1].classList.add('active');
        }
    }
</script>

</body>
</html>

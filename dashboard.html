<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard | clubofpuppy.com</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --gold: #c5a059; --black: #1a1a1a; --cream: #fdfaf5; --white: #ffffff; }
        body { font-family: 'Times New Roman', Times, serif; background-color: var(--cream); margin: 0; }
        
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 5%; background: white; border-bottom: 1px solid #ddd;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--black); font-weight: bold; font-size: 1.5rem; }
        .menu-container { position: relative; }
        .menu-button { background: white; border: 1px solid #ccc; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-family: inherit; font-weight: bold; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: white; min-width: 220px; box-shadow: 0px 8px 16px rgba(0,0,0,0.1); border-radius: 8px; z-index: 1001; }
        .dropdown-content a { color: var(--black); padding: 14px 16px; text-decoration: none; display: block; font-weight: bold; border-bottom: 1px solid #f9f9f9; }
        .dropdown-content a:hover { background-color: var(--cream); color: var(--gold); }
        .show { display: block; }

        .container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .welcome-card { background: white; padding: 30px; border-radius: 12px; border-left: 5px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        
        .dashboard-tabs { display: flex; gap: 20px; margin: 20px 0; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; font-family: inherit; font-size: 1rem; font-weight: bold; cursor: pointer; color: #666; padding-bottom: 10px; }
        .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .stat-box { background: white; padding: 20px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .stat-box h3 { margin: 0; color: var(--gold); font-size: 2rem; }
        
        .action-btn { background: var(--black); color: white; padding: 15px 30px; border-radius: 30px; text-decoration: none; display: inline-block; font-weight: bold; margin-top: 20px; }
        .hidden { display: none; }
        
        .puppy-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; background: #fff; margin-bottom: 10px; border-radius: 8px; }
        .delete-btn { background: #d9534f; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }

        /* Inbox Styling */
        .message-card { background: #f9f9f9; border: 1px solid #eee; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid var(--gold); }
        .message-header { display: flex; justify-content: space-between; font-size: 0.9rem; color: #555; margin-bottom: 8px; }
        .reply-link { color: var(--gold); text-decoration: none; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

<nav class="top-nav">
    <a href="index.html" class="logo-area"><span style="color: var(--gold)">🐾</span> clubofpuppy.com</a>
    <div class="menu-container">
        <button class="menu-button" onclick="toggleMenu()">MENU ☰</button>
        <div id="myDropdown" class="dropdown-content">
            <a href="puppies.html">Find a Puppy</a>
            <a href="dashboard.html" style="color: var(--gold);">⭐ My Dashboard</a>
            <a href="post-puppy.html">Post a Puppy</a>
            <a href="#" onclick="logoutUser()" style="color: #d9534f; border-top: 1px solid #eee; font-weight: bold;">✕ Log Out</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="welcome-card">
        <h2>Welcome Back, <span id="userEmailDisplay">...</span>!</h2>
        <p>Status: <span style="color: var(--gold); font-weight: bold;">✔ Identity Verified</span></p>
        
        <div class="dashboard-tabs">
            <button class="tab-btn active" id="tab-overview" onclick="switchTab('overview')">Overview</button>
            <button class="tab-btn" id="tab-puppies" onclick="switchTab('puppies')">My Puppies</button>
            <button class="tab-btn" id="tab-messages" onclick="switchTab('messages')">📩 Inbox</button>
        </div>

        <div id="overview-section">
            <div class="stats-grid">
                <div class="stat-box"><h3 id="activeCount">0</h3><p>Active Listings</p></div>
                <div class="stat-box"><h3 id="msgCount">0</h3><p>New Messages</p></div>
                <div class="stat-box"><h3>$20</h3><p>Monthly Plan</p></div>
            </div>
            <a href="post-puppy.html" class="action-btn">+ Post New Puppy</a>
        </div>

        <div id="puppies-section" class="hidden">
            <h3>Your Live Listings</h3>
            <div id="puppyListContainer">Loading your puppies...</div>
        </div>

        <div id="messages-section" class="hidden">
            <h3>Buyer Inquiries</h3>
            <div id="inbox-container">Checking for messages...</div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA9jhhmqYLdWmyDSKvv3KI8T6fF2vQ5pZE",
        authDomain: "clubofpuppy.firebaseapp.com",
        projectId: "clubofpuppy",
        storageBucket: "clubofpuppy.firebasestorage.app",
        messagingSenderId: "536581562349",
        appId: "1:536581562349:web:041e792ff70639ccba91e4"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('userEmailDisplay').innerText = user.email;
            loadUserPuppies(user.email);
            loadInbox(user.email); // New: Load messages too
        } else {
            window.location.href = "signin.html";
        }
    });

    function loadUserPuppies(email) {
        const container = document.getElementById('puppyListContainer');
        db.collection("puppies").where("sellerEmail", "==", email).onSnapshot((snapshot) => {
            document.getElementById('activeCount').innerText = snapshot.size;
            if (snapshot.empty) {
                container.innerHTML = '<p>No listings yet. <a href="post-puppy.html">Post one now.</a></p>';
                return;
            }
            let html = "";
            snapshot.forEach((doc) => {
                const p = doc.data();
                html += `
                    <div class="puppy-item">
                        <div><strong>${p.breed}</strong> - $${p.price}</div>
                        <button class="delete-btn" onclick="deletePuppy('${doc.id}')">Delete</button>
                    </div>`;
            });
            container.innerHTML = html;
        });
    }

    // NEW: Load Messages Function
    function loadInbox(email) {
        const inbox = document.getElementById('inbox-container');
        db.collection("messages")
          .where("receiverEmail", "==", email)
          .orderBy("timestamp", "desc")
          .onSnapshot((snapshot) => {
              document.getElementById('msgCount').innerText = snapshot.size;
              if (snapshot.empty) {
                  inbox.innerHTML = '<p>No messages received yet.</p>';
                  return;
              }
              let html = "";
              snapshot.forEach((doc) => {
                  const m = doc.data();
                  const date = m.timestamp ? m.timestamp.toDate().toLocaleDateString() : "Just now";
                  html += `
                    <div class="message-card">
                        <div class="message-header">
                            <strong>From: ${m.senderEmail}</strong>
                            <span>${date}</span>
                        </div>
                        <p style="margin: 5px 0;">"${m.text}"</p>
                        <small style="color: var(--gold); display: block; margin-bottom: 8px;">Regarding: ${m.breed}</small>
                        <a href="mailto:${m.senderEmail}" class="reply-link">↪ Reply via Email</a>
                    </div>`;
              });
              inbox.innerHTML = html;
          });
    }

    function deletePuppy(docId) {
        if(confirm("Are you sure you want to remove this listing?")) {
            db.collection("puppies").doc(docId).delete().then(() => alert("Removed."));
        }
    }

    function switchTab(tabName) {
        const sections = ['overview', 'puppies', 'messages'];
        sections.forEach(s => {
            document.getElementById(s + '-section').classList.add('hidden');
            document.getElementById('tab-' + s).classList.remove('active');
        });
        document.getElementById(tabName + '-section').classList.remove('hidden');
        document.getElementById('tab-' + tabName).classList.add('active');
    }

    function toggleMenu() { document.getElementById("myDropdown").classList.toggle("show"); }
    function logoutUser() { auth.signOut().then(() => { window.location.href = "index.html"; }); }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard | clubofpuppy.com</title>
    <style>
        :root { --gold: #c5a059; --black: #1a1a1a; --cream: #fdfaf5; --white: #ffffff; }
        body { font-family: 'Times New Roman', Times, serif; background-color: var(--cream); margin: 0; }
        
        /* HOMEPAGE MENU STYLES */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            background: white;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--black);
            font-weight: bold;
            font-size: 1.5rem;
        }
        .menu-container { position: relative; }
        .menu-button {
            background: white;
            border: 1px solid #ccc;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-family: inherit;
            font-weight: bold;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: white;
            min-width: 220px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.1);
            border-radius: 8px;
            z-index: 1001;
        }
        .dropdown-content a {
            color: var(--black);
            padding: 14px 16px;
            text-decoration: none;
            display: block;
            font-weight: bold;
            border-bottom: 1px solid #f9f9f9;
        }
        .dropdown-content a:hover { background-color: var(--cream); color: var(--gold); }
        .show { display: block; }

        /* DASHBOARD SPECIFIC STYLES */
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .welcome-card { background: white; padding: 30px; border-radius: 12px; border-left: 5px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .dashboard-tabs { display: flex; gap: 20px; margin: 20px 0; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; font-family: inherit; font-size: 1rem; font-weight: bold; cursor: pointer; color: #666; }
        .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .stat-box { background: white; padding: 20px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .stat-box h3 { margin: 0; color: var(--gold); font-size: 2rem; }
        .action-btn { background: var(--black); color: white; padding: 15px 30px; border-radius: 30px; text-decoration: none; display: inline-block; font-weight: bold; margin-top: 20px; }
        .hidden { display: none; }
        
        /* PUPPY LISTING CARDS */
        .puppy-item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 15px; border-bottom: 1px solid #eee; background: #fff; margin-bottom: 10px; border-radius: 8px;
        }
        .delete-link { color: #d9534f; cursor: pointer; font-size: 0.8rem; text-decoration: underline; }
    </style>
</head>
<body>

<nav class="top-nav">
    <a href="index.html" class="logo-area">
        <span style="color: var(--gold)">🐾</span> clubofpuppy.com
    </a>

    <div class="menu-container">
        <button class="menu-button" onclick="toggleMenu()">MENU ☰</button>
        <div id="myDropdown" class="dropdown-content">
            <a href="puppies.html">Find a Puppy</a>
            <a href="dashboard.html" style="color: var(--gold);">⭐ My Dashboard</a>
            <a href="post-puppy.html">Post a Puppy</a>
            <a href="#" onclick="logoutUser()" style="color: #d9534f; border-top: 1px solid #eee; font-weight: bold;">✕ Log Out</a>
            <a href="mailto:clubofpuppyhelp@gmail.com" style="font-size: 0.8rem; color: #888;">Contact Support</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="welcome-card">
        <h2>Welcome Back, <span id="userEmailDisplay">Member</span>!</h2>
        <p>Status: <span style="color: var(--gold); font-weight: bold;">✔ Identity Verified</span></p>
        
        <div class="dashboard-tabs">
            <button class="tab-btn active" onclick="switchTab('overview')">Overview</button>
            <button class="tab-btn" onclick="switchTab('puppies')">My Puppies for Sale</button>
        </div>

        <div id="overview-section">
            <div class="stats-grid">
                <div class="stat-box"><h3 id="activeCount">0</h3><p>Active Listings</p></div>
                <div class="stat-box"><h3>0</h3><p>Inquiries</p></div>
                <div class="stat-box"><h3>$20</h3><p>Monthly Plan</p></div>
            </div>
            <a href="post-puppy.html" class="action-btn">+ Post New Puppy</a>
        </div>

        <div id="puppies-section" class="hidden">
            <h3>Your Live Listings</h3>
            <div id="puppyListContainer">
                </div>
        </div>
    </div>
</div>

<script>
    // Security Check
    if (localStorage.getItem('isLoggedIn') !== 'true') { window.location.href = "signin.html"; }

    // Display Email
    document.getElementById('userEmailDisplay').innerText = localStorage.getItem('clubUserEmail') || "Member";

    // Menu Toggle
    function toggleMenu() { document.getElementById("myDropdown").classList.toggle("show"); }

    // Logout
    function logoutUser() {
        localStorage.removeItem('isLoggedIn');
        window.location.href = "index.html";
    }

    // Tab Switching
    function switchTab(tabName) {
        const overview = document.getElementById('overview-section');
        const puppies = document.getElementById('puppies-section');
        const buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        if (tabName === 'overview') {
            overview.classList.remove('hidden');
            puppies.classList.add('hidden');
            buttons[0].classList.add('active');
        } else {
            overview.classList.add('hidden');
            puppies.classList.remove('hidden');
            buttons[1].classList.add('active');
            loadPuppies();
        }
    }

    // LOAD SAVED PUPPIES
    function loadPuppies() {
        const container = document.getElementById('puppyListContainer');
        const list = JSON.parse(localStorage.getItem('myPuppies')) || [];
        document.getElementById('activeCount').innerText = list.length;

        if (list.length === 0) {
            container.innerHTML = '<p>No listings yet. <a href="post-puppy.html">Post one now.</a></p>';
            return;
        }

        container.innerHTML = list.map(p => `
            <div class="puppy-item">
                <div>
                    <strong>${p.breed}</strong> - $${p.price}<br>
                    <small>${p.gender}</small>
                </div>
                <span class="delete-link" onclick="deletePuppy(${p.id})">Remove Listing</span>
            </div>
        `).join('');
    }

    function deletePuppy(id) {
        let list = JSON.parse(localStorage.getItem('myPuppies')) || [];
        list = list.filter(p => p.id !== id);
        localStorage.setItem('myPuppies', JSON.stringify(list));
        loadPuppies();
    }

    // Run on load
    loadPuppies();

    // Close menu click outside
    window.onclick = function(event) {
        if (!event.target.matches('.menu-button')) {
            var dropdowns = document.getElementsByClassName("dropdown-content");
            for (var i = 0; i < dropdowns.length; i++) {
                if (dropdowns[i].classList.contains('show')) dropdowns[i].classList.remove('show');
            }
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Puppies | clubofpuppy.com</title>
    <style>
        :root { --gold: #c5a059; --black: #1a1a1a; --cream: #fdfaf5; --white: #ffffff; }
        
        body { 
            font-family: 'Times New Roman', Times, serif; 
            background-color: var(--cream); 
            margin: 0; 
            color: var(--black);
        }

        /* Nav Bar */
        .nav { 
            background: white; 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #ddd; 
            sticky: top;
        }
        .nav a { text-decoration: none; color: var(--black); font-weight: bold; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        .header-area { text-align: center; margin-bottom: 40px; }
        .header-area h1 { font-size: 2.5rem; color: var(--black); margin-bottom: 10px; }

        /* The Grid */
        .puppy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        /* Puppy Card */
        .puppy-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }

        .puppy-card:hover { transform: translateY(-5px); }

        .puppy-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #f0f0f0;
        }

        .puppy-info { padding: 20px; flex-grow: 1; }
        
        .puppy-breed { font-size: 1.4rem; font-weight: bold; margin: 0; }
        .puppy-price { color: var(--gold); font-size: 1.2rem; font-weight: bold; margin: 5px 0; }
        .puppy-details { font-size: 0.9rem; color: #666; margin-bottom: 15px; }
        
        .puppy-desc { 
            font-size: 0.9rem; 
            line-height: 1.4; 
            color: #444; 
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .contact-btn {
            display: block;
            text-align: center;
            background: var(--black);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .contact-btn:hover { background: var(--gold); }

        .empty-state {
            text-align: center;
            grid-column: 1 / -1;
            padding: 50px;
            color: #888;
        }
    </style>
</head>
<body>

<nav class="nav">
    <a href="index.html" style="font-size: 1.2rem;">🐾 clubofpuppy.com</a>
    <div style="display: flex; gap: 20px;">
        <a href="index.html">Home</a>
        <a href="dashboard.html">My Dashboard</a>
    </div>
</nav>

<div class="container">
    <div class="header-area">
        <h1>Find Your Puppy</h1>
        <p>Verified listings from our club members</p>
    </div>

    <div class="puppy-grid" id="puppyGrid">
        </div>
</div>

<script>
    function displayPuppies() {
        const grid = document.getElementById('puppyGrid');
        // Get the puppies from local storage
        const allPuppies = JSON.parse(localStorage.getItem('myPuppies')) || [];

        if (allPuppies.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <h3>No puppies found</h3>
                    <p>Be the first to post a puppy! <a href="post-puppy.html" style="color: var(--gold);">Click here</a></p>
                </div>
            `;
            return;
        }

        // Loop through the data and build cards
        grid.innerHTML = allPuppies.map(puppy => `
            <div class="puppy-card">
                <img src="${puppy.image}" class="puppy-img" alt="${puppy.breed}" onerror="this.src='https://placedog.net/500'">
                <div class="puppy-info">
                    <p class="puppy-breed">${puppy.breed}</p>
                    <p class="puppy-price">$${puppy.price}</p>
                    <p class="puppy-details">${puppy.gender} • Verified Seller</p>
                    <p class="puppy-desc">${puppy.description || "No description provided."}</p>
                    <a href="mailto:support@clubofpuppy.com?subject=Inquiry about ${puppy.breed}" class="contact-btn">Contact Seller</a>
                </div>
            </div>
        `).join('');
    }

    // Load the puppies when the page opens
    displayPuppies();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find a Puppy | clubofpuppy.com</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --gold: #c5a059; --black: #1a1a1a; --cream: #fdfaf5; --white: #ffffff; }
        body { font-family: 'Times New Roman', Times, serif; background-color: var(--cream); margin: 0; color: var(--black); }
        
        /* Navigation */
        .nav { padding: 15px 5%; background: white; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav a { color: var(--gold); text-decoration: none; font-weight: bold; font-family: sans-serif; }

        /* Grid */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .puppy-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            margin-top: 20px;
        }

        /* Card Styling */
        .puppy-card { 
            background: white; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
            transition: 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .puppy-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }

        .img-container { width: 100%; height: 240px; background: #f0f0f0; overflow: hidden; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        /* Auto-Age Tag */
        .age-tag { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 5px 12px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; font-family: sans-serif; }

        .puppy-info { padding: 20px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; }
        .puppy-info h3 { margin: 0; font-size: 1.5rem; color: var(--black); font-weight: bold; }
        .price { color: var(--black); font-size: 1.3rem; font-weight: bold; margin: 8px 0; font-family: sans-serif; }
        .location-text { color: #888; font-size: 0.9rem; margin-bottom: 15px; font-family: sans-serif; }

        /* Buttons */
        .action-btn { 
            display: block; 
            padding: 12px; 
            text-decoration: none; 
            border-radius: 25px; 
            font-weight: bold; 
            font-family: sans-serif;
            font-size: 0.9rem;
            text-align: center;
            margin-top: auto;
        }
        .btn-message { background: var(--black); color: white; }
        .btn-login { border: 1px solid var(--black); color: var(--black); }
        
        .loading-text { text-align: center; margin-top: 50px; color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="nav">
    <a href="index.html" style="font-size: 1.2rem;">🐾 clubofpuppy.com</a>
    <div>
        <a href="dashboard.html" style="margin-right: 15px;">Dashboard</a>
        <a href="messages.html">Messages</a>
    </div>
</div>

<div class="container">
    <h2 style="text-align: center; margin-top: 30px; letter-spacing: 1px; font-size: 2rem;">Available Puppies</h2>
    <div id="puppy-container" class="puppy-grid">
        <p class="loading-text">Searching the club...</p>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA9jhhmqYLdWmyDSKvv3KI8T6fF2vQ5pZE",
        authDomain: "clubofpuppy.firebaseapp.com",
        projectId: "clubofpuppy",
        storageBucket: "clubofpuppy.firebasestorage.app",
        messagingSenderId: "536581562349",
        appId: "1:536581562349:web:041e792ff70639ccba91e4"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // Live Age Calculation
    function getLiveAge(birthTimestamp) {
        if (!birthTimestamp) return "8 WEEKS"; 
        const birthDate = birthTimestamp.toDate();
        const now = new Date();
        const diffInMs = now - birthDate;
        const diffInWeeks = Math.floor(diffInMs / (1000 * 60 * 60 * 24 * 7));
        return diffInWeeks + " WEEKS";
    }

    function fetchPuppies(user) {
        const container = document.getElementById('puppy-container');
        
        db.collection("puppies").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            if (snapshot.empty) {
                container.innerHTML = '<p class="loading-text">No puppies found. Check back soon!</p>';
                return;
            }

            let html = "";
            snapshot.forEach((doc) => {
                const p = doc.data();
                const breed = p.breed || "Puppy";
                const price = p.price || "0";
                const img = p.image || "";
                const location = p.location || "Location TBD";
                const seller = p.sellerEmail || "";
                const liveAgeTag = getLiveAge(p.birthDate);

                let actionButton = "";
                if (user) {
                    const profileLink = `profile.html?seller=${encodeURIComponent(seller)}&breed=${encodeURIComponent(breed)}&img=${encodeURIComponent(img)}`;
                    actionButton = `<a href="${profileLink}" class="action-btn btn-message">Message Seller</a>`;
                } else {
                    actionButton = `<a href="signup.html" class="action-btn btn-login">Sign in to Message</a>`;
                }

                html += `
                  <div class="puppy-card">
                      <div class="img-container">
                          <img src="${img}" alt="${breed}" onerror="this.src='https://via.placeholder.com/300?text=Image+Error'">
                          <div class="age-tag">${liveAgeTag}</div>
                      </div>
                      <div class="puppy-info">
                          <div class="price">$${price}</div>
                          <h3>${breed}</h3>
                          <p class="location-text">${location}</p>
                          ${actionButton}
                      </div>
                  </div>`;
            });
            container.innerHTML = html;
        });
    }

    auth.onAuthStateChanged((user) => {
        fetchPuppies(user);
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find a Puppy | clubofpuppy.com</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --gold: #c5a059; --black: #1a1a1a; --cream: #fdfaf5; --white: #ffffff; }
        body { font-family: 'Times New Roman', Times, serif; background-color: var(--cream); margin: 0; color: var(--black); }
        
        /* Navigation */
        .nav { padding: 15px 5%; background: white; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav a { color: var(--gold); text-decoration: none; font-weight: bold; font-family: sans-serif; }

        /* The Grid Layout */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .puppy-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            margin-top: 20px;
        }

        /* Puppy Card Styling */
        .puppy-card { 
            background: white; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
            transition: 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .puppy-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }

        .img-container { width: 100%; height: 220px; background: #f0f0f0; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        .puppy-info { padding: 15px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .puppy-info h3 { margin: 5px 0; font-size: 1.4rem; color: var(--black); }
        .price { color: #666; font-weight: bold; margin-bottom: 15px; font-family: sans-serif; }

        /* Buttons */
        .action-btn { 
            display: block; 
            padding: 12px; 
            text-decoration: none; 
            border-radius: 25px; 
            font-weight: bold; 
            font-family: sans-serif;
            font-size: 0.9rem;
            text-align: center;
        }
        .btn-message { background: var(--gold); color: white; }
        .btn-login { background: var(--black); color: white; }
        
        .loading-text { text-align: center; margin-top: 50px; color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="nav">
    <a href="index.html" style="font-size: 1.2rem;">🐾 clubofpuppy.com</a>
    <div>
        <a href="dashboard.html" style="margin-right: 15px;">Dashboard</a>
        <a href="messages.html">Messages</a>
    </div>
</div>

<div class="container">
    <h2 style="text-align: center; margin-top: 30px; letter-spacing: 1px;">AVAILABLE PUPPIES</h2>
    <div id="puppy-container" class="puppy-grid">
        <p class="loading-text">Searching the club...</p>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA9jhhmqYLdWmyDSKvv3KI8T6fF2vQ5pZE",
        authDomain: "clubofpuppy.firebaseapp.com",
        projectId: "clubofpuppy",
        storageBucket: "clubofpuppy.firebasestorage.app",
        messagingSenderId: "536581562349",
        appId: "1:536581562349:web:041e792ff70639ccba91e4"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    function fetchPuppies(user) {
        const container = document.getElementById('puppy-container');
        
        // Use onSnapshot for real-time updates
        db.collection("puppies").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            if (snapshot.empty) {
                container.innerHTML = '<p class="loading-text">No puppies found. Check back soon!</p>';
                return;
            }

            let html = "";
            snapshot.forEach((doc) => {
                const p = doc.data();
                
                // Fallback for missing data
                const breed = p.breed || "Unknown Breed";
                const price = p.price || "Contact for price";
                const gender = p.gender || "";
                const img = p.image || "https://via.placeholder.com/300?text=No+Image";
                const seller = p.sellerEmail || "";

                let actionButton = "";
                if (user) {
                    // Safe URL building for the profile page
                    const profileLink = `profile.html?seller=${encodeURIComponent(seller)}&breed=${encodeURIComponent(breed)}&img=${encodeURIComponent(img)}`;
                    actionButton = `<a href="${profileLink}" class="action-btn btn-message">Message Seller</a>`;
                } else {
                    actionButton = `<a href="signup.html" class="action-btn btn-login">Sign in to Message</a>`;
                }

                html += `
                  <div class="puppy-card">
                      <div class="img-container">
                          <img src="${img}" alt="${breed}" onerror="this.src='https://via.placeholder.com/300?text=Image+Error'">
                      </div>
                      <div class="puppy-info">
                          <div>
                              <h3>${breed}</h3>
                              <p class="price">$${price} ${gender ? '• ' + gender : ''}</p>
                          </div>
                          ${actionButton}
                      </div>
                  </div>`;
            });
            container.innerHTML = html;
        }, (error) => {
            console.error("Error fetching puppies:", error);
            container.innerHTML = '<p class="loading-text" style="color: red;">Error loading puppies. Please refresh.</p>';
        });
    }

    // This makes sure the page updates the moment someone logs in/out
    auth.onAuthStateChanged((user) => {
        fetchPuppies(user);
    });
</script>

</body>
</html>

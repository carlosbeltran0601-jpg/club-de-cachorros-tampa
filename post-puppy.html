<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Puppy | clubofpuppy.com</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <style>
        :root { --gold: #c5a059; --black: #1a1a1a; --cream: #fdfaf5; }
        body { font-family: 'Times New Roman', Times, serif; background: var(--cream); padding: 20px; margin: 0; }
        
        .form-card { 
            max-width: 600px; 
            margin: 20px auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            border: 1px solid var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 { border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-top: 10px; color: var(--black); }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; }
        
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; 
            box-sizing: border-box; font-size: 1rem; font-family: inherit;
        }

        #preview-container { margin-top: 15px; display: none; text-align: center; border: 1px solid #eee; padding: 10px; border-radius: 8px; }
        #imagePreview { width: 100%; max-height: 300px; object-fit: cover; border-radius: 5px; }

        .submit-btn { 
            width: 100%; background: var(--black); color: white; padding: 16px; border: none; 
            border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1.1rem; 
            transition: 0.3s; margin-top: 10px;
        }
        .submit-btn:hover { background: var(--gold); }
        .back-btn { text-decoration: none; color: var(--gold); font-weight: bold; font-size: 0.9rem; }
        
        .upload-btn {
            background: #f9f9f9; border: 2px dashed var(--gold); color: var(--gold);
            padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="form-card">
    <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>
    <h2>Post a New Puppy</h2>
    
    <form id="puppyForm">
        <div class="input-group">
            <label>Breed</label>
            <input type="text" id="breed" placeholder="e.g. Golden Retriever" required>
        </div>

        <div class="input-group">
            <label>Price ($)</label>
            <input type="number" id="price" placeholder="1500" required>
        </div>

        <div class="input-group">
            <label>Gender</label>
            <select id="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>

        <div class="input-group">
            <label>📸 Puppy Photo</label>
            <button type="button" id="upload_widget_btn" class="upload-btn">Open Camera or Gallery</button>
            <div id="preview-container">
                <img id="imagePreview" src="" alt="Preview">
            </div>
        </div>

        <div class="input-group">
            <label>Description</label>
            <textarea id="description" rows="4" placeholder="Tell us about the puppy..."></textarea>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Publish Listing</button>
    </form>
</div>

<script>
    // 1. FIREBASE INITIALIZATION
    const firebaseConfig = {
        apiKey: "AIzaSyA9jhhmqYLdWmyDSKvv3KI8T6fF2vQ5pZE",
        authDomain: "clubofpuppy.firebaseapp.com",
        projectId: "clubofpuppy",
        storageBucket: "clubofpuppy.firebasestorage.app",
        messagingSenderId: "536581562349",
        appId: "1:536581562349:web:041e792ff70639ccba91e4"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const auth = firebase.auth();

    let uploadedImageUrl = ""; 

    // 2. CLOUDINARY WIDGET (The "Matchmaker")
    var myWidget = cloudinary.createUploadWidget({
        cloudName: 'drbgoqaxk', 
        uploadPreset: 'puppy_uploads', 
        sources: ['local', 'camera'], 
        multiple: false,
        resourceType: 'image', // Forces the widget to only look for images
        maxFileSize: 15000000 // 15MB limit
    }, (error, result) => { 
        if (!error && result && result.event === "success") { 
            uploadedImageUrl = result.info.secure_url;
            document.getElementById('imagePreview').src = uploadedImageUrl;
            document.getElementById('preview-container').style.display = 'block';
            document.getElementById('upload_widget_btn').innerText = "✅ Photo Attached";
            document.getElementById('upload_widget_btn').style.borderColor = "#4BB543";
        }
        if (error) {
            console.log("Upload Error:", error);
        }
    });

    // AUTO-POP: The camera opens as soon as the page is ready
    window.onload = () => { myWidget.open(); };

    // Manual button if they close the pop-up
    document.getElementById("upload_widget_btn").onclick = () => { myWidget.open(); };

    // 3. FINAL PUBLISH TO FIREBASE
    document.getElementById('puppyForm').onsubmit = async function(e) {
        e.preventDefault();
        
        const user = auth.currentUser;
        const submitBtn = document.getElementById('submitBtn');

        if (!user) return alert("Please log in first!");
        if (!uploadedImageUrl) {
            alert("Please upload a photo first!");
            myWidget.open();
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerText = "Publishing Listing...";

        db.collection("puppies").add({
            breed: document.getElementById('breed').value,
            price: document.getElementById('price').value,
            gender: document.getElementById('gender').value,
            image: uploadedImageUrl, // THE URL FROM CLOUDINARY
            description: document.getElementById('description').value,
            sellerEmail: user.email,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        })
        .then(() => {
            alert("Success! Your puppy is now live.");
            window.location.href = "dashboard.html";
        })
        .catch((err) => {
            alert("Database Error: " + err.message);
            submitBtn.disabled = false;
            submitBtn.innerText = "Publish Listing";
        });
    };
</script>

</body>
</html>

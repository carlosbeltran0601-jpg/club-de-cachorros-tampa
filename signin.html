<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | clubofpuppy.com</title>
    <style>
        :root {
            --gold: #c5a059;
            --black: #1a1a1a;
            --cream: #fdfaf5;
            --white: #ffffff;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: var(--cream);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .signin-card {
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 { color: var(--black); margin-bottom: 5px; }
        p { color: #666; margin-bottom: 25px; font-size: 0.9rem; }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--black);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .cta-button {
            width: 100%;
            background-color: var(--black);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .cta-button:hover {
            background-color: var(--gold);
        }

        .footer-links {
            margin-top: 25px;
            font-size: 0.9rem;
        }

        .footer-links a {
            color: var(--gold);
            text-decoration: none;
            font-weight: bold;
            margin: 0 10px;
        }
    </style>
</head>
<body>

<div class="signin-card">
    <div style="font-size: 2.5rem; margin-bottom: 10px;">🐾</div>
    <h2>Sign In</h2>
    <p>Welcome back to the Club</p>

    <form id="signinForm">
        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="example@mail.com" required>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="cta-button">Sign In</button>
    </form>

    <div class="footer-links">
        <a href="signup.html">Create Account</a>
        <span>|</span>
        <a href="index.html">Home</a>
    </div>
</div>

<script>
    document.getElementById('signinForm').onsubmit = function(e) {
        e.preventDefault();
        
        const emailInput = document.getElementById('email').value;
        const passInput = document.getElementById('password').value;

        // Pull saved data
        const savedEmail = localStorage.getItem('clubUserEmail');
        const savedPass = localStorage.getItem('clubUserPassword');

        if (emailInput === savedEmail && passInput === savedPass) {
            alert("Login successful! Redirecting to your Dashboard...");
            // CRITICAL: This is the line that moves them to the dashboard
            window.location.href = "dashboard.html"; 
        } else {
            alert("Invalid email or password. Please try again.");
        }
    };
</script>

</body>
</html>

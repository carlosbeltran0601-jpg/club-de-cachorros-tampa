<script>
    // 1. THE CONFIG (The "ID Card" for your database)
    const firebaseConfig = {
        apiKey: "AIzaSyA9jhhmqYLdWmyDSKvv3KI8T6fF2vQ5pZE",
        authDomain: "clubofpuppy.firebaseapp.com",
        projectId: "clubofpuppy",
        storageBucket: "clubofpuppy.firebasestorage.app",
        messagingSenderId: "536581562349",
        appId: "1:536581562349:web:041e792ff70639ccba91e4"
    };

    // 2. INITIALIZE (Turn the engine on)
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();

    const signinForm = document.getElementById('signinForm');
    const loginBtn = document.getElementById('loginBtn');

    signinForm.onsubmit = function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        loginBtn.innerText = "Opening Club Gates...";
        loginBtn.disabled = true;

        // 3. THE LOGIN ACTION
        auth.signInWithEmailAndPassword(email, password)
            .then((userCredential) => {
                console.log("Login Success!");
                // Jump to dashboard
                window.location.replace("dashboard.html");
            })
            .catch((error) => {
                loginBtn.innerText = "Sign In";
                loginBtn.disabled = false;
                
                // Better error messages
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                    alert("Invalid email or password. Please try again.");
                } else {
                    alert("Error: " + error.message);
                }
            });
    };
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | clubofpuppy.com</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --gold: #c5a059; --black: #1a1a1a; --cream: #fdfaf5; --white: #ffffff; }
        body { font-family: 'Times New Roman', Times, serif; background-color: var(--cream); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .signup-card { background: var(--white); padding: 40px; border-radius: 12px; border: 1px solid var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: var(--black); margin-bottom: 5px; }
        p { color: #666; margin-bottom: 25px; font-size: 0.9rem; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--black); font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 1rem; }
        .cta-button { width: 100%; background-color: var(--black); color: white; padding: 15px; border: none; border-radius: 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .cta-button:hover { background-color: var(--gold); transform: translateY(-1px); }
        .back-link { display: block; margin-top: 25px; color: var(--gold); text-decoration: none; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="signup-card">
    <div style="font-size: 2.5rem; margin-bottom: 10px;">🐾</div>
    <h2>Create Your Account</h2>
    <p>Join the Nationwide Puppy Club</p>

    <form id="signupForm">
        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="example@mail.com" required>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="cta-button" id="signupBtn">Create Account</button>
    </form>

    <a href="index.html" class="back-link">← Back to Homepage</a>
</div>

<script>
    // YOUR FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyA9jhhmqYLdWmyDSKvv3KI8T6fF2vQ5pZE",
        authDomain: "clubofpuppy.firebaseapp.com",
        projectId: "clubofpuppy",
        storageBucket: "clubofpuppy.firebasestorage.app",
        messagingSenderId: "536581562349",
        appId: "1:536581562349:web:041e792ff70639ccba91e4"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const signupForm = document.getElementById('signupForm');
    const signupBtn = document.getElementById('signupBtn');

    signupForm.onsubmit = function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        signupBtn.innerText = "Joining the Club...";
        signupBtn.disabled = true;

        // REAL FIREBASE SIGN UP
        auth.createUserWithEmailAndPassword(email, password)
            .then((userCredential) => {
                alert("Success! Welcome to the Puppy Club.");
                window.location.href = "dashboard.html"; 
            })
            .catch((error) => {
                signupBtn.innerText = "Create Account";
                signupBtn.disabled = false;
                alert("Error: " + error.message);
            });
    };
</script>

</body>
</html>

<section id="seller-section" style="display:none; padding: 40px 20px; text-align: center;">
    <div class="price-card" style="max-width: 400px; margin: 0 auto; background: white; padding: 30px; border: 2px solid var(--gold); border-radius: 15px;">
        <h2 style="font-family: 'Times New Roman', serif; margin-bottom: 5px;">Seller Registration</h2>
        <p style="color: #666; font-size: 0.9rem; margin-bottom: 25px;">Create your free account to start managing your listings.</p>
        
        <form id="signupForm" onsubmit="handleFreeSignUp(event)">
            <input type="text" id="bizName" placeholder="Kennel or Business Name" required 
                style="width:90%; padding:12px; margin:10px 0; border: 1px solid #ccc; font-family: inherit; border-radius: 5px;">
            
            <input type="email" id="sellerEmail" placeholder="Email Address" required 
                style="width:90%; padding:12px; margin:10px 0; border: 1px solid #ccc; font-family: inherit; border-radius: 5px;">
            
            <input type="password" id="sellerPass" placeholder="Create Password" required 
                style="width:90%; padding:12px; margin:10px 0; border: 1px solid #ccc; font-family: inherit; border-radius: 5px;">
            
            <div style="text-align: left; width: 90%; margin: 15px auto; font-size: 0.85rem;">
                <input type="checkbox" required> I agree to the <a href="#" style="color: var(--gold); text-decoration: none;">Terms of Service</a>
            </div>

            <button type="submit" class="cta-button" style="width:100%; border:none; cursor:pointer; background-color: var(--black); color: white; padding: 15px; border-radius: 30px; font-weight: bold; font-size: 1.1rem;">
                Create Free Account
            </button>
        </form>
        
        <p style="font-size: 0.8rem; color: #888; margin-top: 20px;">
            Already have an account? <a href="#" onclick="openLogin()" style="color: var(--gold); text-decoration: none; font-weight: bold;">Sign In</a>
        </p>
    </div>
</section>

<script>
    function handleFreeSignUp(event) {
        event.preventDefault();
        
        const email = document.getElementById('sellerEmail').value;
        const bizName = document.getElementById('bizName').value;

        // Log the data (in a real app, this sends to your database)
        console.log("Account Created for:", email);

        // Redirect them to their new Dashboard instead of Stripe
        alert("Welcome to the Club, " + bizName + "! Your account has been created.");
        window.location.href = "dashboard.html"; 
    }

    // Toggle logic to show this section
    function showSellers() {
        document.getElementById("buyer-section").style.display = "none";
        document.getElementById("seller-section").style.display = "block";
        document.getElementById("myDropdown").classList.remove("show");
    }
</script>
